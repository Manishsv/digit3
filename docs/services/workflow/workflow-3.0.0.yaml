openapi: 3.0.3
info:
  title: Workflow service API definitions
  version: 3.0.0
  description: API for creating, updating, searching, and transitioning workflow processes

servers:
  - url: /workflow/v3

security:
  - BearerAuth: []

tags:
  - name: Process
    description: Operations related to workflow processes
  - name: State
    description: Operations for managing states within a process
  - name: Action
    description: Operations for managing actions within states

paths:

  /processes:
    post:
      summary: Create a new process
      tags: [Process]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Process'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Process'
    get:
      summary: List processes
      tags: [Process]
      parameters:
        - in: query
          name: id
          schema:
            type: array
            items:
              type: string
        - in: query
          name: code
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Process'

  /processes/{id}:
    get:
      summary: Get a specific process
      tags: [Process]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Process'
    put:
      summary: Update an existing process
      tags: [Process]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Process'
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Process'
    delete:
      summary: Delete a process
      tags: [Process]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Process deleted successfully

  /process-definitions:
    get:
      summary: List process definitions
      tags: [Process]
      parameters:
        - in: query
          name: id
          schema:
            type: array
            items:
              type: string
        - in: query
          name: name
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProcessDefinationDetail'

  /transition:
    post:
      summary: Transition a process instance to the next state
      tags: [Process]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProcessInstance'
      responses:
        '200':
          description: Transition successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessInstance'

  /states:
    post:
      summary: Create a new state
      tags: [State]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/State'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/State'
    get:
      summary: List states
      tags: [State]
      parameters:
        - in: query
          name: processId
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/State'

  /states/{id}:
    get:
      summary: Get a specific state
      tags: [State]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/State'
    put:
      summary: Update a state
      tags: [State]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/State'
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/State'
    delete:
      summary: Delete a state
      tags: [State]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: State deleted successfully

  /states/{stateId}/actions:
    post:
      summary: Create an action for a state
      tags: [Action]
      parameters:
        - in: path
          name: stateId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Action'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
    get:
      summary: List actions for a state
      tags: [Action]
      parameters:
        - in: path
          name: stateId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Action'

  /actions/{id}:
    get:
      summary: Get a specific action
      tags: [Action]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
    put:
      summary: Update an action
      tags: [Action]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Action'
      responses:
        '200':
          description: Updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
    delete:
      summary: Delete an action
      tags: [Action]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Action deleted successfully


    
components:
  securitySchemes:
    BearerAuth:
      $ref: 'https://raw.githubusercontent.com/egovernments/DIGIT-3.0/master/common-3.0.0.yaml#/components/securitySchemes/BearerAuth'
  
  parameters:
    RequestIdHeader:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/parameters/RequestIdHeader'
    CorrelationIdHeader:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/parameters/CorrelationIdHeader'
    UserAgentHeader:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/parameters/UserAgentHeader'
    TenantIdHeader:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/parameters/TenantIdHeader'
    ForwardedForHeader:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/parameters/ForwardedForHeader'
    ClientId:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/parameters/ClientId'
    ClientSecret:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/parameters/ClientSecret'
    TimeStamp:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/parameters/TimeStamp'

  headers:
    X-Response-Time:
        $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/headers/X-Response-Time'
    X-Response-Timestamp:
        $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/headers/X-Response-Timestamp'
    X-Request-ID:
        $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/headers/X-Request-ID'
    X-Correlation-ID:
        $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/headers/X-Correlation-ID'
    X-Tenant-ID:
        $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/headers/X-Tenant-ID'
    X-Rate-Limit:
        $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/headers/X-Rate-Limit'
    X-Rate-Limit-Remaining:
        $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/headers/X-Rate-Limit-Remaining'
    X-Rate-Limit-Reset:
        $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/headers/X-Rate-Limit-Reset'
  
  schemas:
    
    Error:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/schemas/Error'
    
    AuditDetail:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/schemas/AuditDetail'
    
    Document:
      $ref: 'https://raw.githubusercontent.com/digitnxt/digit3/refs/heads/master/docs/Specifications/Common/Common-3.0.0.yaml#/components/schemas/Document'

    Process:
      type: object
      required:
        - id
        - name
        - code
        - stats
      properties:
        id:
          type: string
          description: System generated unique identifier of the process for internal referance
          minLength: 2
          maxLength: 64
          readOnly: true
        name:
          type: string
          description: Human-readable name of the process
          minLength: 2
          maxLength: 128
        code:
          type: string
          description: Unique identifier of the process 
          minLength: 2
          maxLength: 128
        description:
          type: string
          description: Detailed description of the process
          minLength: 4
          maxLength: 512
        version:
          type: string
          description: Version of the process
          minLength: 1
          maxLength: 32
        sla:
          type: integer
          format: int64
          description: Service Level Agreement (SLA) for the entire process in minutes.This defines the expected time within which the process should be completed
        auditDetail:
          $ref: '#/components/schemas/AuditDetail'
 
    State:
      type: object
      required:
        - code
        - name
        - processId
      properties:
        code:
          type: string
          description: Unique code of the state
          minLength: 2
          maxLength: 64
        name:
          type: string
          description: Human-readable name of the state
          minLength: 2
          maxLength: 128
        description:
          type: string
          description: Description of the state
          maxLength: 512
        processId:
          type: string
          description: ID of the process this state belongs to
        sla:
          type: integer
          format: int64
          description: Service Level Agreement (SLA) for this state in minutes.This defines the expected time within which this state should be completed
        isInitial:
          type: boolean
          description: Indicates whether this is the initial state
        isParallel:
          type: boolean
          description: If true, this state starts parallel branches
        isJoin:
          type: boolean
          description: If true, this state waits for all branches to complete
        branchStates:
          type: array
          items:
            type: string
          description: List of states to enter in parallel (used with isParallel = true)
        auditDetail:
          $ref: '#/components/schemas/AuditDetail'

    Action:
      type: object
      required:
        - name
        - currentState
        - nextState
      properties:
        name:
          type: string
          description: Unique name of the action
          minLength: 2
          maxLength: 64
        label:
          type: string
          description: Display label for the action
          maxLength: 128
        currentState:
          type: string
          description: Code of the state from which this action originates
        nextState:
          type: string
          description: Code of the state to transition to if this action is taken
        roles:
          type: array
          description: List of roles (actors) allowed to perform this action
          items:
            type: string
        attributeValidation:
          $ref: '#/components/schemas/AttributeValidation'
        auditDetail:
          $ref: '#/components/schemas/AuditDetail'

    
    StateDetail:
      allOf:
        - $ref: '#/components/schemas/State'
        - type: object
          properties:
            actions:
              type: array
              items:
                $ref: '#/components/schemas/Action'

    ProcessDefinationDetail:
      allOf:
        - $ref: '#/components/schemas/Process'
        - type: object
          properties:
            states:
              type: array
              items:
                $ref: '#/components/schemas/StateDetail'
    
    ProcessInstance:
      type: object
      properties:
        id:
          maxLength: 64
          minLength: 2
          type: string
          description: Unique process instance id (UUID)
          readOnly: true
        processId:
          type: string
          description: ID of the associated process definition
        entityId:
          type: string
          description: ID of the entity the process is managing (e.g., application ID, document ID)
        action:
          maxLength: 128
          minLength: 2
          type: string
          description: Actions are define for each business service.
        status:
          maxLength: 64
          minLength: 2
          type: string
          description: Status will be populate by efengine for each action, if it is configured.
          readOnly: true
        comment:
          maxLength: 512
          minLength: 2
          type: string
          description: actors can pass the comment on each action.
        documents:
          type: array
          description: Documents can be attached with each of the action.
          items:
            $ref: '#/components/schemas/Document'
        assigner:
          type: string
        assignes:
          type: array
          items:
            type:  string
        currentState:
          type: string
          description: Code of the current state
        stateSla:
          type: integer
          description: Date from when license is valid as epoch.
          format: int64
        processSla:
          type: integer
          description: Date from when license is valid as epoch.
          format: int64  
        attributes:
          type: object
          description: Runtime user attributes to evaluate against guard attributes. Keys represent attribute names; values are lists of values or single values.
          additionalProperties:
            type: array
            items:
              type: string
            example:
               "attributes": {
                "role": ["EMPLOYEE"],
                "jurisdiction": ["Koramangala"],
                "department": ["Health"]
              }
        auditDetails:
          $ref: '#/components/schemas/AuditDetail'

    AttributeValidation:
      type: object
      required:
        - actionId
      properties:
        id:
          type: string
          description: Unique identifier of the guard
          readOnly: true
        attributes:
          type: object
          description: Attributes object that defines dynamic, flexible conditions to control who can perform the action. Each key represents an attribute category (e.g., jurisdiction, department, user group), and the corresponding value is a list of allowed values for that category.
          example:
             "attributes": {"role": ["CITIZEN"] }
          additionalProperties:
            type: array
            items:
              type: string
        assigneeCheck:
          type: boolean
          description: Whether to enforce that only the assigned user can perform this action
        auditDetail:
          $ref: '#/components/schemas/AuditDetail'
