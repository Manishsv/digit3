# Flyway Configuration File for Workflow Service (Docker)
# This file contains the configuration for database migrations in Docker
# Compatible with Flyway Community Edition

# Migration locations (Docker container path)
flyway.locations=filesystem:/flyway/sql

# Baseline configuration
flyway.baselineOnMigrate=true
flyway.baselineVersion=1
flyway.baselineDescription=<< Flyway Baseline >>

# Validation settings
flyway.validateOnMigrate=true

# Migration execution settings
flyway.outOfOrder=true
flyway.cleanDisabled=true

# Placeholder settings
flyway.placeholderReplacement=false

# Connection settings (will be overridden by environment variables)
# flyway.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
# flyway.user=${DB_USER}
# flyway.password=${DB_PASSWORD}

# Schema settings
flyway.defaultSchema=public

# Table name for migration history
# flyway.table=flyway_schema_history

# Enable mixed mode (SQL and Java migrations)
flyway.mixed=false

# Encoding
flyway.encoding=UTF-8

# Note: ignoreMissingMigrations removed - not available in this Flyway version

# Connection retry settings for Docker environments
flyway.connectRetries=60
flyway.connectRetriesInterval=1 