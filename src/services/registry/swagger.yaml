openapi: 3.0.3
info:
  title: Registry Service
  version: 1.0.0
  description: |
    OpenAPI specification for the Registry Service implemented in `code/services/registry`.
    The service manages JSON schemas and schema-bound registry data for multi-tenant clients.
servers:
  - url: http://localhost:8080
    description: Local development server
components:
  parameters:
    TenantHeader:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
      description: Tenant identifier used for data isolation.
    ClientHeader:
      name: X-Client-ID
      in: header
      required: true
      schema:
        type: string
      description: Client identifier recorded for auditing.
    CallbackURLHeader:
      name: X-Callback-URL
      in: header
      required: false
      schema:
        type: string
        format: uri
      description: Overrides the schema configured webhook target for a single request.
    CallbackAuthHeader:
      name: X-Callback-Auth
      in: header
      required: false
      schema:
        type: string
      description: Authorization header value forwarded to callback destination.
    DataIdQuery:
      name: id
      in: query
      required: true
      schema:
        type: string
      description: Either the UUID of the version row or the stable registryId.
    RegistryIdQuery:
      name: registryId
      in: query
      required: true
      schema:
        type: string
      description: Stable registry identifier shared across versions of a record.
    HistoryQuery:
      name: history
      in: query
      required: false
      schema:
        type: boolean
        default: false
      description: When true, returns every version for a registryId instead of just the latest.
    SchemaCodePath:
      name: schemaCode
      in: path
      required: true
      schema:
        type: string
      description: Schema code that uniquely identifies the schema definition.
    RecordIdPath:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: UUID of a registry data row or registryId for delete operations.
    SchemaVersionQuery:
      name: version
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: Specific schema version to retrieve.
    LimitQuery:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 100
      description: Maximum number of rows to return.
    OffsetQuery:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Offset for paginated queries.
  schemas:
    SchemaRequest:
      type: object
      required:
        - schemaCode
        - definition
      properties:
        schemaCode:
          type: string
        definition:
          type: object
          additionalProperties: true
          description: JSON Schema Draft 2020-12 definition for the data payload.
        x-unique:
          type: array
          description: List of unique constraints; each entry is an array of one or more dot-notation field paths that must be unique together among active records.
          items:
            type: array
            minItems: 1
            items:
              type: string
        x-ref-schema:
          type: array
          items:
            $ref: '#/components/schemas/RefSchema'
        x-indexes:
          type: array
          items:
            $ref: '#/components/schemas/SchemaIndex'
        webhook:
          $ref: '#/components/schemas/WebhookConfig'
    Schema:
      allOf:
        - $ref: '#/components/schemas/SchemaRequest'
        - type: object
          required:
            - id
            - version
            - isLatest
            - isActive
            - auditDetails
          properties:
            id:
              type: string
              format: uuid
            version:
              type: integer
              minimum: 1
            isLatest:
              type: boolean
            isActive:
              type: boolean
            auditDetails:
              $ref: '#/components/schemas/AuditDetails'
    RefSchema:
      type: object
      required:
        - fieldPath
        - schemaCode
      properties:
        fieldPath:
          type: string
          description: Dot-notation path inside the data payload containing the reference.
        schemaCode:
          type: string
          description: Referenced schema whose data must contain the foreign value.
        refField:
          type: string
          description: Optional field path in the referenced schema (defaults to registryId).
        external:
          type: boolean
          description: When true, validate the reference via an external registry service.
        registry:
          type: string
          description: Discovery key identifying the target registry for external validation. Defaults to schemaCode when omitted.
    SchemaIndex:
      type: object
      required:
        - fieldPath
      properties:
        name:
          type: string
        fieldPath:
          type: string
        method:
          type: string
          enum: [btree, gin]
          description: Postgres index method; btree if omitted.
    WebhookConfig:
      type: object
      required:
        - url
        - active
      properties:
        url:
          type: string
          format: uri
        method:
          type: string
          description: HTTP method to call, defaults to POST.
        apiKey:
          type: string
        headers:
          type: object
          additionalProperties:
            type: string
        active:
          type: boolean
    AuditDetails:
      type: object
      required:
        - createdBy
        - createdTime
        - modifiedBy
        - modifiedTime
      properties:
        createdBy:
          type: string
          description: Identifier from the X-Client-ID header that created the resource.
        createdTime:
          type: integer
          format: int64
          description: Epoch milliseconds when the record was created.
        modifiedBy:
          type: string
          description: Identifier from the X-Client-ID header that last modified the resource.
        modifiedTime:
          type: integer
          format: int64
          description: Epoch milliseconds when the record was last modified.
    DataRequest:
      type: object
      required:
        - data
      properties:
        version:
          type: integer
          minimum: 1
          description: Required for updates to ensure optimistic locking.
        data:
          type: object
          additionalProperties: true
          description: Arbitrary JSON payload validated by the schema definition.
    RegistryData:
      type: object
      required:
        - id
        - registryId
        - schemaCode
        - schemaVersion
        - version
        - data
        - isActive
        - effectiveFrom
        - auditDetails
      properties:
        id:
          type: string
          format: uuid
        registryId:
          type: string
        schemaCode:
          type: string
        schemaVersion:
          type: integer
        version:
          type: integer
        data:
          type: object
          additionalProperties: true
        isActive:
          type: boolean
        effectiveFrom:
          type: string
          format: date-time
        effectiveTo:
          type: string
          format: date-time
          nullable: true
        auditDetails:
          $ref: '#/components/schemas/AuditDetails'
    SearchRequest:
      type: object
      properties:
        filters:
          type: object
          additionalProperties: {}
          description: Equality filters applied using data->>'key'.
        contains:
          type: object
          additionalProperties: {}
          description: JSON containment predicates applied with data @> value.
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0
    ExistsResponse:
      type: object
      required:
        - exists
      properties:
        exists:
          type: boolean
    VerificationResponse:
      allOf:
        - $ref: '#/components/schemas/ResponseEnvelope'
        - type: object
          properties:
            data:
              type: object
              properties:
                valid:
                  type: boolean
    ResponseEnvelope:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
        data:
          description: Payload returned on success; varies by endpoint.
        error:
          type: string
        message:
          type: string
    SchemaResponse:
      allOf:
        - $ref: '#/components/schemas/ResponseEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Schema'
    SchemaListResponse:
      allOf:
        - $ref: '#/components/schemas/ResponseEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Schema'
    RegistryDataResponse:
      allOf:
        - $ref: '#/components/schemas/ResponseEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/RegistryData'
    RegistryDataListResponse:
      allOf:
        - $ref: '#/components/schemas/ResponseEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/RegistryData'
    ExistsEnvelope:
      allOf:
        - $ref: '#/components/schemas/ResponseEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ExistsResponse'
    IsExistRequest:
      type: object
      properties:
        tenantId:
          type: string
          description: Tenant identifier to check; defaults to the header value when omitted.
        field:
          type: string
          description: Field path or column to test (registryId by default).
        value:
          type: string
          description: Value to verify.
      required:
        - value
tags:
  - name: Schema
    description: Schema management APIs
  - name: Data
    description: Registry data APIs

paths:
  /registry/v1/schema:
    post:
      tags:
        - Schema
      summary: Create schema
      description: Creates the first version of a schema for the tenant and provisions the backing data table.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ClientHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchemaRequest'
      responses:
        '201':
          description: Schema created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEnvelope'
    get:
      tags:
        - Schema
      summary: List schemas
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ClientHeader'
      responses:
        '200':
          description: Schemas for the tenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaListResponse'
        '500':
          description: Failure listing schemas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEnvelope'
  /registry/v1/schema/{schemaCode}:
    get:
      tags:
        - Schema
      summary: Get schema
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ClientHeader'
        - $ref: '#/components/parameters/SchemaCodePath'
        - $ref: '#/components/parameters/SchemaVersionQuery'
      responses:
        '200':
          description: Schema definition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaResponse'
        '404':
          description: Schema not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEnvelope'
    put:
      tags:
        - Schema
      summary: Update schema
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ClientHeader'
        - $ref: '#/components/parameters/SchemaCodePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchemaRequest'
      responses:
        '200':
          description: Schema updated or unchanged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaResponse'
        '400':
          description: Validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEnvelope'
    delete:
      tags:
        - Schema
      summary: Delete schema
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ClientHeader'
        - $ref: '#/components/parameters/SchemaCodePath'
      responses:
        '200':
          description: Schema deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEnvelope'
        '404':
          description: Schema not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEnvelope'
  /registry/v1/schema/{schemaCode}/_isExist:
    post:
      tags:
        - Schema
      summary: Check existence by field
      description: Validates whether a record exists for the given tenant and field value; used for cross-registry reference checks.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ClientHeader'
        - $ref: '#/components/parameters/SchemaCodePath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IsExistRequest'
      responses:
        '200':
          description: Existence flag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExistsEnvelope'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEnvelope'
  /registry/v1/schema/{schemaCode}/data:
    post:
      tags:
        - Data
      summary: Create registry data
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ClientHeader'
        - $ref: '#/components/parameters/SchemaCodePath'
        - $ref: '#/components/parameters/CallbackURLHeader'
        - $ref: '#/components/parameters/CallbackAuthHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataRequest'
      responses:
        '201':
          description: Registry data created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryDataResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEnvelope'
    get:
      tags:
        - Data
      summary: Get registry data
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ClientHeader'
        - $ref: '#/components/parameters/SchemaCodePath'
        - $ref: '#/components/parameters/DataIdQuery'
      responses:
        '200':
          description: Registry data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryDataResponse'
        '404':
          description: Data not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEnvelope'
    put:
      tags:
        - Data
      summary: Update registry data
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ClientHeader'
        - $ref: '#/components/parameters/SchemaCodePath'
        - $ref: '#/components/parameters/DataIdQuery'
        - $ref: '#/components/parameters/CallbackURLHeader'
        - $ref: '#/components/parameters/CallbackAuthHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataRequest'
      responses:
        '200':
          description: Registry data updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryDataResponse'
        '400':
          description: Validation or version error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEnvelope'
  /registry/v1/schema/{schemaCode}/data/{id}:
    delete:
      tags:
        - Data
      summary: Delete registry data
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ClientHeader'
        - $ref: '#/components/parameters/SchemaCodePath'
        - $ref: '#/components/parameters/RecordIdPath'
        - $ref: '#/components/parameters/CallbackURLHeader'
        - $ref: '#/components/parameters/CallbackAuthHeader'
      responses:
        '200':
          description: Record deleted (soft)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEnvelope'
        '404':
          description: Data not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEnvelope'
  /registry/v1/schema/{schemaCode}/data/_exists:
    get:
      tags:
        - Data
      summary: Check record existence
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ClientHeader'
        - $ref: '#/components/parameters/SchemaCodePath'
        - $ref: '#/components/parameters/DataIdQuery'
      responses:
        '200':
          description: Existence flag
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExistsEnvelope'
        '400':
          description: Missing parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEnvelope'
  /registry/v1/schema/{schemaCode}/data/_registry:
    get:
      tags:
        - Data
      summary: Get registry history by registryId
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ClientHeader'
        - $ref: '#/components/parameters/SchemaCodePath'
        - $ref: '#/components/parameters/RegistryIdQuery'
        - $ref: '#/components/parameters/HistoryQuery'
      responses:
        '200':
          description: Latest record or history
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/RegistryDataResponse'
                  - $ref: '#/components/schemas/RegistryDataListResponse'
        '404':
          description: RegistryId not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEnvelope'
  /registry/v1/schema/{schemaCode}/data/_verify:
    get:
      tags:
        - Data
      summary: Verify registry data signature
      description: Validates the stored audit signature for the specified record UUID (`id`) or stable `registryId`.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ClientHeader'
        - $ref: '#/components/parameters/SchemaCodePath'
        - name: id
          in: query
          required: false
          schema:
            type: string
          description: UUID of a specific registry data record version.
        - name: registryId
          in: query
          required: false
          schema:
            type: string
          description: Stable registry identifier when record UUID is not known.
      responses:
        '200':
          description: Verification status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationResponse'
        '400':
          description: Missing parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEnvelope'
        '404':
          description: Record or audit log not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEnvelope'
        '501':
          description: Signature verification is not configured
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEnvelope'
  /registry/v1/schema/{schemaCode}/data/_search:
    post:
      tags:
        - Data
      summary: Search registry data
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
        - $ref: '#/components/parameters/ClientHeader'
        - $ref: '#/components/parameters/SchemaCodePath'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: Matching records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryDataListResponse'
        '400':
          description: Invalid search body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResponseEnvelope'
  /health:
    get:
      tags:
        - Data
      summary: Health check
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
